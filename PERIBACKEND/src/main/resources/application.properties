spring.profiles.active=dev
spring.application.name=PERI
spring.config.import=file:.env[.properties]

server.port=${PORT:9090}

#spring.security.users.name=serkan.kilicdere
#spring.security.users.password=${SPRING_SECURITY_USER_PASSWORD:}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/peri}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD:}

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.location=${uploaddirectory}

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.issuer=${APP_JWT_ISSUER:PERI}
app.jwt.duration-ms=${APP_JWT_DURATION_MS:600000}
app.base-url-backend=${APP_BASE_URL_BACKEND:http://localhost:9090}
app.base-url-frontend=${APP_BASE_URL_FRONTEND:http://localhost:5173}

management.otlp.metrics.export.enabled=false

logging.file.name=PERI_LOG
logging.level.org.springframework.security=DEBUG
logging.logback.rollingpolicy.max-file-size=10MB
