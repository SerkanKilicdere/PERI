services:
  postgres:
    image: postgres:17-alpine
    container_name: peri-postgres
    environment:
      POSTGRES_DB: peri
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peri"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./PERIBACKEND
      dockerfile: Dockerfile
    container_name: peri-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/peri
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      MAIL_USERNAME: your_mail_username
      MAIL_PASSWORD: your_mail_password
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: "587"
      APP_JWT_SECRET: replace_with_a_long_random_secret
      APP_JWT_ISSUER: PERI
      APP_JWT_DURATION_MS: "600000"
      APP_BASE_URL_BACKEND: http://localhost:9090
      APP_BASE_URL_FRONTEND: http://localhost:8080
      uploaddirectory: /app/uploaded
    ports:
      - "9090:9090"
    volumes:
      - backend_uploaded:/app/uploaded

  frontend:
    build:
      context: ./PERIFRONTEND
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: peri-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  backend_uploaded:
